<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Инди-игры блог</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>🎮 Инди-игры блог</h1>
    <p>Новости, обзоры и впечатления от маленьких шедевров</p>
  </header>

  <main class="container" id="posts-container">
    <!-- Карточки постов будут добавлены через JavaScript -->
  </main>

  <!-- Модальное окно для полного текста поста -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>Простой блог об инди-играх | Сделано с ❤️</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
